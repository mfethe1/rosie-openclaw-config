# NATS Server Configuration — fumemory swarm mesh
server_name: fumemory-railway

# Client connections — MUST match RAILWAY_TCP_APPLICATION_PORT routing
port: 4222

# HTTP monitoring — Railway healthcheck path /varz
http_port: 8222

# JetStream
jetstream {
    store_dir: /data/jetstream
    max_mem: 256MB
    max_file: 1GB
}

logtime: true
debug: false
trace: false
max_connections: 256
max_payload: 1MB
ping_interval: 20s
ping_max: 3
